services:
  - type: web
    name: calcojobs
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT web.app:app
    envVars:
      - key: SITE_NAME
        value: Calcojobs
      - key: SITE_URL
        value: https://calcojobs.com
      - key: CLAWBOT_SECRET_KEY
        generateValue: true
      # Email — add values in Render dashboard
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        sync: false
      # Job scraper APIs — add values in Render dashboard
      - key: USAJOBS_API_KEY
        sync: false
      - key: USAJOBS_EMAIL
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false

  - type: cron
    name: calcojobs-weekly-scrape
    env: python
    schedule: "0 10 * * 0"
    buildCommand: pip install -r requirements.txt
    startCommand: python scrapers/run.py
    envVars:
      - key: USAJOBS_API_KEY
        sync: false
      - key: USAJOBS_EMAIL
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
